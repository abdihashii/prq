name: Deploy Web

# Auto-deploys the prq-web Worker on merge to main (issue #23, companion to #19/#20).
on:
  # Manual "Run workflow" button for ad-hoc redeploys without a code change.
  workflow_dispatch:
  push:
    branches: [main]
    # Worker bundles @prq/shared, so a shared change must also redeploy.
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web.yml'

# Least privilege: this job only reads the repo to build + deploy.
permissions:
  contents: read

# Serialize web deploys; never cancel one mid-publish. Separate group from
# deploy-api so the two workflows don't block each other.
concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04 # pinned (not ubuntu-latest) for a reproducible image
    environment: production
    timeout-minutes: 15
    steps:
      # Actions pinned to commit SHAs (tags are mutable); trailing comment = version.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Deploy never pushes; don't persist GITHUB_TOKEN into .git/config.
          persist-credentials: false
      # action-setup BEFORE setup-node: cache:pnpm needs pnpm on PATH first.
      # Version is read from package.json packageManager (pnpm@10.33.2).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22 # matches root engines.node ">=22"; no .nvmrc exists
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @prq/web typecheck
      - run: pnpm --filter @prq/web test
      # "run deploy", not "pnpm deploy" (collides with pnpm's built-in deploy).
      # The deploy script runs `vite build && wrangler deploy`. wrangler reads
      # CLOUDFLARE_API_TOKEN automatically; account_id is committed in wrangler.jsonc.
      - run: pnpm --filter @prq/web run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
