name: Deploy API

# Auto-deploys the prq-api Worker on merge to main (issue #19, ADR 0001 stage 6).
on:
  push:
    branches: [main]
    # Worker bundles @prq/shared, so a shared change must also redeploy.
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'

# Least privilege: this job only reads the repo to build + deploy. No repo writes,
# no OIDC (wrangler authenticates with an API token, not id-token).
permissions:
  contents: read

# Serialize deploys; never cancel one mid-publish.
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions pinned to commit SHAs (tags are mutable); trailing comment = version.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # action-setup BEFORE setup-node: cache:pnpm needs pnpm on PATH first.
      # Version is read from package.json packageManager (pnpm@10.33.2).
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22 # matches root engines.node ">=22"; no .nvmrc exists
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @prq/api typecheck
      - run: pnpm --filter @prq/api test
      # "run deploy", not "pnpm deploy" (collides with pnpm's built-in deploy).
      # Secret passed via env (not inlined); wrangler reads CLOUDFLARE_API_TOKEN
      # automatically; account_id is committed in wrangler.jsonc.
      - run: pnpm --filter @prq/api run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
