services:
  postgres:
    image: postgres:17.9
    environment:
      POSTGRES_DB: prq_dev
      POSTGRES_PASSWORD: prq
      POSTGRES_USER: prq
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prq -d prq_dev"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
